  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body {
      font-family:'Quicksand',sans-serif;
      height:100vh;
      display:flex;
      flex-direction:column;
      background: url('https://plus.unsplash.com/premium_photo-1663133679087-bc5deb50ab00?q=80&w=1002&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D') no-repeat center center fixed;
      background-size: cover;
      color: #fff;
      position: relative;
    }
    body::before {
      content:'';
      position:absolute;
      top:0; left:0; right:0; bottom:0;
      background: rgba(0,0,0,0.5); /* subtle overlay so logo pops */
      z-index:0;
    }

    header {
      position:relative;
      z-index:1;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:3rem 2rem 1rem; /* move text a bit higher */
    }

    /* Logo background behind it for visibility */
    .logo-wrapper {
      position:relative;
      padding: 1rem 2rem;
      border-radius: 20px;
      margin-bottom:1rem;
    }
    .logo-wrapper img {
      max-width:200px;
      height:auto;
      display:block;
    }

    header h1 {
      font-family:'Poppins',sans-serif;
      font-size:3rem;
      color:#FFFAF0;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
    }
    header p {
      font-size:1.25rem;
      color:#FFE4B5;
      margin-top:0.5rem;
      text-shadow:1px 1px 5px rgba(0,0,0,0.5);
    }

    /* Language dropdown */
    .lang-dropdown-container {
      position:absolute;
      top:1rem;
      right:2rem;
      z-index:2;
    }
    .lang-dropdown-btn {
      background: rgba(255, 140, 0,0.8);
      color:#fff;
      border:none;
      padding:0.5rem 0.9rem;
      border-radius:8px;
      font-weight:600;
      cursor:pointer;
      font-family:'Poppins',sans-serif;
    }
    .lang-dropdown-btn:hover { background: rgba(255,140,0,1); }
    .lang-dropdown-menu {
      display:none;
      position:absolute;
      top:100%;
      right:0;
      background: rgba(255,255,255,0.95);
      border-radius:8px;
      margin-top:0.5rem;
      min-width:140px;
      overflow:hidden;
      color:#333;
    }
    .lang-dropdown-menu a {
      display:block;
      padding:0.5rem 1rem;
      color:#333;
      text-decoration:none;
    }
    .lang-dropdown-menu a:hover { background:#FFA500; color:#fff; }
    .show { display:block; }

    main {
      z-index:1;
      position:relative;
      flex-grow:1;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:2rem;
      margin-top:-2rem; /* lift content up to see background more */
    }

    main h2 {
      font-size:2.5rem;
      margin-bottom:1rem;
      text-shadow:2px 2px 6px rgba(0,0,0,0.5);
    }
    main p {
      font-size:1.25rem;
      max-width:600px;
      margin-bottom:2rem;
      text-shadow:1px 1px 4px rgba(0,0,0,0.5);
    }

    /* Lounge chair icon */
    .lounge-icon {
      font-size:4rem;
      margin-bottom:2rem;
      animation: floatChair 2s ease-in-out infinite;
    }
    @keyframes floatChair {
      0%,100%{transform:translateY(0);}
      50%{transform:translateY(-10px);}
    }

    .bottom-buttons {
      display:flex;
      gap:2rem;
      flex-wrap:wrap;
      justify-content:center;
    }
    .bottom-buttons a {
      padding:0.75rem 2rem;
      background:#FFA500;
      border-radius:12px;
      font-weight:700;
      color:#fff;
      text-decoration:none;
      font-family:'Poppins',sans-serif;
      transition:0.3s;
      box-shadow: 0 4px 12px rgba(255,165,0,0.5);
    }
    .bottom-buttons a:hover { background:#FF8C00; box-shadow:0 6px 20px rgba(255,140,0,0.7); }

    @media(max-width:700px){
      header h1{font-size:2.5rem;}
      main h2{font-size:2rem;}
    }

    <div class="lounge-icon">🏖️</div>
    <h2>We'll be back soon!</h2>
    <p>
      Furosion is taking a short summer pause! If there’s an event during the summer, you’ll get an email and our site will update. Enjoy the sun and stay tuned for more adventures!
    </p>
    <div class="bottom-buttons">
      <a href="gallery.html">Photos</a>
      <a href="mailto:support@furosion.com">Contact Us</a>
    </div>
  </main>

  <script>
    function toggleLangMenu() {
      document.getElementById("langMenu").classList.toggle("show");
    }
    window.onclick = function(event) {
      if(!event.target.matches('.lang-dropdown-btn')) {
        document.getElementById("langMenu").classList.remove("show");
      }
    }
  </script>
